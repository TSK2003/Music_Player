name: music_player
description: "Antigravity Music Player - A premium cinematic music streaming app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.0.0
  media_kit_libs_windows_audio: ^1.0.9
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  rxdart: ^0.28.0
  http: ^1.3.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  provider: ^6.1.2
  html: ^0.15.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
